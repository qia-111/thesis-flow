<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论文格式排版 · Thesis Flow</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Display", "Inter", sans-serif;
      background: #f0f6f9;
      color: #1f2937;
      line-height: 1.7;
      overflow-x: hidden;
    }
    .page-header {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(240,246,249,0.85);
      backdrop-filter: blur(12px);
      z-index: 98;
    }
    .back-btn {
      display:flex;align-items:center;gap:8px;color:#1f2937;font-size:14px;cursor:pointer;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .page-title { font-size:28px; margin-bottom: 8px; }
    .desc { color:#4b5563; margin-bottom: 32px; }
    .card {
      background:#fff;
      border-radius:18px;
      padding:28px;
      border:1px solid rgba(0,0,0,0.05);
      box-shadow:0 10px 30px rgba(0,0,0,0.04);
    }
    .select-area {
      width:100%;
      padding:16px;
      border:1px solid #e5e7eb;
      border-radius:10px;
      font-size:15px;
      margin-bottom:16px;
      background:#fff;
    }
    .content-area {
      width:100%;
      min-height:460px;
      padding:16px;
      border:1px solid #e5e7eb;
      border-radius:10px;
      font-size:15px;
      resize:vertical;
      outline:none;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 16px;
    }
    button {
      padding:11px 20px;
      border-radius:8px;
      font-size:14px;
      cursor:pointer;
      transition:all 0.25s ease;
      border:none;
    }
    .primary { background:#1f2937;color:#fff; }
    .primary:hover { background:#111827; }
    .secondary { background:transparent;border:1px solid #d1d5db; }
    .result {
      margin-top:24px;
      padding:18px;
      background:#f3f4f6;
      border-radius:10px;
      white-space:pre-wrap;
      display:none;
    }
    .wrap {
      opacity:0;
      transform:translateY(24px);
      filter:blur(2px);
      animation:pageEnter 1.3s ease-out 0.15s forwards;
    }
    @keyframes pageEnter {
      to{opacity:1;transform:translateY(0);filter:blur(0);}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="page-header">
      <div class="back-btn" onclick="goIndex()">
        <i data-lucide="arrow-left" style="width:16px;height:16px"></i>
        返回
      </div>
      <div class="title">论文格式排版</div>
      <div></div>
    </div>
    <div class="container">
      <h1 class="page-title">论文格式排版</h1>
      <p class="desc">一键统一字体、行距、段落格式，快速适配院校规范</p>
      <div class="card">
        <select class="select-area">
          <option>本科通用格式</option>
          <option>硕士论文格式</option>
          <option>期刊投稿格式</option>
        </select>
        <textarea id="inputText" class="content-area" placeholder="粘贴需要排版的论文内容，一键标准化格式"></textarea>

        <div class="actions">
          <button class="secondary" onclick="copyResult()">一键复制</button>
          <button class="primary" onclick="startFormat()">开始排版</button>
        </div>
        <div id="resultBox" class="result"></div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // 修复后的返回首页函数
    function goIndex() {
      window.location.href = '/';
    }

    async function startFormat() {
      const input = document.getElementById('inputText').value.trim();
      const resultBox = document.getElementById('resultBox');
      if (!input) return alert('请输入需要排版的文本');

      resultBox.style.display = 'block';
      resultBox.innerText = "正在排版，请稍候...";

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      const apis = [
        {
          url: "https://chatapi.littlewheat.com/v1/chat/completions",
          handler: (r) => r.json().then(j => j.choices[0].message.content)
        },
        {
          url: "https://api.ahriknow.com/ai/gpt",
          handler: (r) => r.json().then(j => j.data)
        }
      ];

      for (const api of apis) {
        try {
          const res = await fetch(api.url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: controller.signal,
            body: JSON.stringify({
              model: "gpt-3.5-turbo",
              messages: [
                {
                  role: "system",
                  content: "你是专业论文格式助手，按本科通用格式整理论文：规范标题层级、段落缩进、行距，输出格式清晰的正文。"
                },
                { role: "user", content: input }
              ]
            })
          });

          clearTimeout(timeout);
          const text = await api.handler(res);
          if (text && !text.includes("拥挤")) {
            resultBox.innerText = text;
            return;
          }
        } catch (err) {
          continue;
        }
      }

      clearTimeout(timeout);
      resultBox.innerText = "当前线路拥挤，请稍后再试";
    }

    function copyResult() {
      const box = document.getElementById('resultBox');
      if(!box.innerText || box.innerText.includes("排版")) return alert("请先完成排版");
      navigator.clipboard.writeText(box.innerText)
      .then(()=>alert("✅ 复制成功"))
      .catch(()=>alert("复制失败"));
    }
  </script>
</body>
</html>
