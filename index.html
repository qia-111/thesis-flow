<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论文智能助手 · Thesis Flow</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Display", "Inter", sans-serif;
      background: #f0f6f9;
      color: #1f2937;
      line-height: 1.7;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .desc {
      color: #4b5563;
      font-size: 16px;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">论文智能助手</h1>
    <p class="desc">一站式论文排版、校对、优化工具</p>

    <div class="grid">
      <div class="card" onclick="window.location.href='/templates/proof.html'">
        <div class="card-title">语法与错字校对</div>
        <div class="card-desc">自动检查错别字、语病、标点</div>
      </div>

      <div class="card" onclick="window.location.href='/templates/format.html'">
        <div class="card-title">论文格式排版</div>
        <div class="card-desc">自动排版段落、行距、标题层级</div>
      </div>

      <div class="card" onclick="window.location.href='/templates/reference.html'">
        <div class="card-title">参考文献生成</div>
        <div class="card-desc">一键生成标准格式引用</div>
      </div>

      <div class="card" onclick="window.location.href='/templates/outline.html'">
        <div class="card-title">自动目录生成</div>
        <div class="card-desc">智能识别标题，生成规范目录</div>
      </div>
    </div>
  </div>

</body>
</html>
